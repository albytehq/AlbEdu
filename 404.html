<!--
  ── AlbEdu 404 Routing Contract (rule-url-albedu.md §6) ──────────────────────
  This file MUST live at the project root (AlbEdu/404.html), NOT in pages/.
  GitHub Pages, Cloudflare Pages, Netlify, and Vercel all auto-serve only the
  root-level 404.html as the fallback for any unmatched URL.

  All asset paths here are ROOT-RELATIVE (no leading slash, no '../'):
    styles/404.css          (project root → styles/)
    public/images/...       (project root → public/)

  The "Kembali ke Beranda" link uses href="./" so it resolves to whatever
  BASE_PATH the page is served from (e.g. /AlbEdu/ on GitHub Pages).
  NEVER use href="/" — that would jump to https://albedu-id.github.io/
  (the user's GitHub profile page) instead of /AlbEdu/ (the actual app).

  An inline <script> at the bottom computes BASE_PATH the same way
  src/auth/main.js AUTH_CONFIG.BASE_PATH does, and rewrites the CTA href
  to the absolute BASE_PATH on load — defensive against the page being
  served from a non-root URL like /AlbEdu/some-deep-path/that-doesnt-exist.
-->

<!-- Favicon Links -->
<script>
  // Favicon paths — use dynamic base
  document.write('<link rel="icon" type="image/x-icon" href="' + window.__ALBEDU_BASE__ + 'public/images/favicon/favicon.ico">');
  document.write('<link rel="icon" type="image/svg+xml" href="' + window.__ALBEDU_BASE__ + 'public/images/favicon/favicon.svg">');
  document.write('<link rel="apple-touch-icon" href="' + window.__ALBEDU_BASE__ + 'public/images/favicon/apple-touch-icon.png">');
  document.write('<link rel="icon" type="image/png" sizes="96x96" href="' + window.__ALBEDU_BASE__ + 'public/images/favicon/favicon-96x96.png">');
  document.write('<link rel="manifest" href="' + window.__ALBEDU_BASE__ + 'public/images/favicon/site.webmanifest">');
</script>

<!-- Dynamic base path detection — works on localhost + GitHub Pages subpath -->
<script>
  // Detect BASE_PATH: /AlbEdu/ on GitHub Pages, / on localhost
  (function() {
    var p = window.location.pathname;
    // Walk up past known app subfolders.
    // v0.742.0: `/pages/admin/pages/` and `/admin/pages/` are kept as legacy
    // patterns — old bookmarked URLs to the pre-flatten structure will hit
    // this 404 page, and the base path detection must still work so the
    // "Kembali ke Beranda" CTA resolves to the correct BASE_PATH.
    var subs = ['/pages/admin/pages/', '/pages/assessment/', '/pages/admin/', '/pages/ujian/', '/admin/pages/', '/ujian/', '/admin/', '/pages/'];
    var base = '/';
    for (var i = 0; i < subs.length; i++) {
      var idx = p.indexOf(subs[i]);
      if (idx !== -1) { base = p.substring(0, idx + 1); break; }
    }
    // If no subfolder match, check if we're in /AlbEdu/ by looking at pathname segments
    if (base === '/' && p.split('/').length > 2 && p.split('/')[1] !== '') {
      // e.g. /AlbEdu/404.html → base = /AlbEdu/
      var segments = p.split('/').filter(Boolean);
      if (segments.length > 1) base = '/' + segments[0] + '/';
    }
    window.__ALBEDU_BASE__ = base;

    // Dynamically inject CSS with correct base path
    var cssFiles = ['styles/tokens.css', 'styles/albedu-v1.css', 'styles/404.css'];
    for (var i = 0; i < cssFiles.length; i++) {
      var link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = base + cssFiles[i];
      document.head.appendChild(link);
    }
  })();
</script>

<!-- Fonts (CDN — always works regardless of base path) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
</head>
<body>

<!-- Dot Grid Background -->
<div class="dot-grid" aria-hidden="true"></div>

<div class="wrapper">
    <div class="error" role="img" aria-label="404 error — halaman tidak ditemukan">
        <!-- Left "4" -->
        <svg class="num-svg num-left" viewBox="0 0 100 130" aria-hidden="true">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M75 0H55L0 80V95H55V115H40V130H90V115H75V95H95V80H75V0ZM55 75V28L22 75H55Z" />
        </svg>

        <!-- Character between the 4s -->
        <div class="face-wrap" id="faceWrap" title="Klik saya!">
            <div class="bg-circle"></div>
            <div class="head">
                <div class="cut"></div>
                <div class="eye left" id="eyeLeft">
                    <div class="pupil" id="pupilLeft"></div>
                </div>
                <div class="eye right" id="eyeRight">
                    <div class="pupil" id="pupilRight"></div>
                </div>
                <div class="cheek left"></div>
                <div class="cheek right"></div>
                <div class="mouth"></div>
            </div>
        </div>

        <!-- Right "4" -->
        <svg class="num-svg num-right" viewBox="0 0 100 130" aria-hidden="true">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M75 0H55L0 80V95H55V115H40V130H90V115H75V95H95V80H75V0ZM55 75V28L22 75H55Z" />
        </svg>
    </div>

    <p class="message">Ups. Halaman yang kamu cari tidak ditemukan.</p>

    <!--
      CTA link: href="./" resolves relative to current path.
      The inline script below rewrites it to an absolute BASE_PATH on load,
      so it works even when GitHub Pages serves this 404 from a deep URL
      like /AlbEdu/some/random/path (the browser keeps that path as the
      base, and "./" would resolve to /AlbEdu/some/random/ — wrong).
    -->
    <a href="./" id="ctaHome" class="cta-btn">Kembali ke Beranda</a>

    <p class="alt-link">atau coba <a href="./" id="altHome">cari yang lain</a></p>
</div>

<script>
(function () {
  'use strict';

  /* ── BASE_PATH-aware CTA rewrite ──────────────────────────────────
   * Mirrors AUTH_CONFIG.BASE_PATH logic in src/auth/main.js.
   * When GitHub Pages serves /AlbEdu/some/deep/missing-path, the
   * browser keeps that path as document base. A relative href="./"
   * would resolve to /AlbEdu/some/deep/ — wrong. We compute the
   * absolute BASE_PATH and rewrite both CTAs.
   *
   * Algorithm (identical to src/auth/main.js):
   *   1. Take window.location.pathname
   *   2. Strip everything after the last '/'
   *   3. Walk up past known app subfolders (admin/pages legacy, ujian, admin)
   *   4. Whatever is left is BASE_PATH (e.g. '/AlbEdu/')
   *
   * v0.742.0: `/admin/pages/` retained as legacy pattern for old bookmarks.
   */
  function computeBasePath() {
    var p    = window.location.pathname;
    var base = p.substring(0, p.lastIndexOf('/') + 1);

    var APP_SUBFOLDERS = ['/admin/pages/', '/ujian/', '/admin/'];
    for (var i = 0; i < APP_SUBFOLDERS.length; i++) {
      var idx = base.indexOf(APP_SUBFOLDERS[i]);
      if (idx !== -1) return base.substring(0, idx + 1);
    }
    return base || '/';
  }

  try {
    var bp = computeBasePath();
    var cta = document.getElementById('ctaHome');
    var alt = document.getElementById('altHome');
    if (cta) cta.setAttribute('href', bp);
    if (alt) alt.setAttribute('href', bp);
  } catch (_) { /* keep default './' */ }

  /* ── Eye-Follow-Mouse ──────────────────────────────────── */
  var pupilLeft  = document.getElementById('pupilLeft');
  var pupilRight = document.getElementById('pupilRight');
  var eyeLeft    = document.getElementById('eyeLeft');
  var eyeRight   = document.getElementById('eyeRight');
  var faceWrap   = document.getElementById('faceWrap');

  var MAX_OFFSET = 3; // px max pupil travel

  function movePupil(eyeEl, pupilEl, mouseX, mouseY) {
    var rect = eyeEl.getBoundingClientRect();
    var cx   = rect.left + rect.width / 2;
    var cy   = rect.top  + rect.height / 2;
    var dx   = mouseX - cx;
    var dy   = mouseY - cy;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist === 0) return;
    var ratio = Math.min(MAX_OFFSET / dist, 1);
    var ox = dx * ratio;
    var oy = dy * ratio;
    pupilEl.style.transform = 'translate(calc(-50% + ' + ox + 'px), calc(-50% + ' + oy + 'px))';
  }

  document.addEventListener('mousemove', function (e) {
    movePupil(eyeLeft,  pupilLeft,  e.clientX, e.clientY);
    movePupil(eyeRight, pupilRight, e.clientX, e.clientY);
  });

  // Touch support
  document.addEventListener('touchmove', function (e) {
    if (e.touches.length > 0) {
      var t = e.touches[0];
      movePupil(eyeLeft,  pupilLeft,  t.clientX, t.clientY);
      movePupil(eyeRight, pupilRight, t.clientX, t.clientY);
    }
  }, { passive: true });

  /* ── Periodic Blink ────────────────────────────────────── */
  function blink() {
    eyeLeft.classList.add('blinking');
    eyeRight.classList.add('blinking');
    setTimeout(function () {
      eyeLeft.classList.remove('blinking');
      eyeRight.classList.remove('blinking');
    }, 200);
  }

  // Random interval between 2.5–5s
  function scheduleBlink() {
    var delay = 2500 + Math.random() * 2500;
    setTimeout(function () {
      blink();
      scheduleBlink();
    }, delay);
  }
  // Start after entrance animation
  setTimeout(scheduleBlink, 1500);

  /* ── Click → Jump ──────────────────────────────────────── */
  faceWrap.addEventListener('click', function () {
    if (faceWrap.classList.contains('jumping')) return;
    faceWrap.classList.add('jumping');
    faceWrap.addEventListener('animationend', function handler() {
      faceWrap.classList.remove('jumping');
      // Restore popUpSpring final state
      faceWrap.style.opacity = '1';
      faceWrap.style.transform = 'scale(1) translateY(0)';
      faceWrap.removeEventListener('animationend', handler);
    });
  });
})();
</script>

</body>
</html>
