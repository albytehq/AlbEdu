<!-- Dot Grid Background -->
<div class="dot-grid" aria-hidden="true"></div>

<div class="wrapper">

        </svg>

        <!-- Character between the 4s -->
        <div class="face-wrap" id="faceWrap" title="Klik saya!">
            <div class="bg-circle"></div>
            <div class="head">
                <div class="cut"></div>
                <div class="eye left" id="eyeLeft">
                    <div class="pupil" id="pupilLeft"></div>
                </div>
                <div class="eye right" id="eyeRight">
                    <div class="pupil" id="pupilRight"></div>
                </div>

<script>
(function () {
  'use strict';

  /* ── Eye-Follow-Mouse ──────────────────────────────────── */
  var pupilLeft  = document.getElementById('pupilLeft');
  var pupilRight = document.getElementById('pupilRight');
  var eyeLeft    = document.getElementById('eyeLeft');
  var eyeRight   = document.getElementById('eyeRight');
  var faceWrap   = document.getElementById('faceWrap');

  var MAX_OFFSET = 3; // px max pupil travel

  function movePupil(eyeEl, pupilEl, mouseX, mouseY) {
    var rect = eyeEl.getBoundingClientRect();
    var cx   = rect.left + rect.width / 2;
    var cy   = rect.top  + rect.height / 2;
    var dx   = mouseX - cx;
    var dy   = mouseY - cy;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist === 0) return;
    var ratio = Math.min(MAX_OFFSET / dist, 1);
    var ox = dx * ratio;
    var oy = dy * ratio;
    pupilEl.style.transform = 'translate(calc(-50% + ' + ox + 'px), calc(-50% + ' + oy + 'px))';
  }

  document.addEventListener('mousemove', function (e) {
    movePupil(eyeLeft,  pupilLeft,  e.clientX, e.clientY);
    movePupil(eyeRight, pupilRight, e.clientX, e.clientY);
  });

  // Touch support
  document.addEventListener('touchmove', function (e) {
    if (e.touches.length > 0) {
      var t = e.touches[0];
      movePupil(eyeLeft,  pupilLeft,  t.clientX, t.clientY);
      movePupil(eyeRight, pupilRight, t.clientX, t.clientY);
    }
  }, { passive: true });

  /* ── Periodic Blink ────────────────────────────────────── */
  function blink() {
    eyeLeft.classList.add('blinking');
    eyeRight.classList.add('blinking');
    setTimeout(function () {
      eyeLeft.classList.remove('blinking');
      eyeRight.classList.remove('blinking');
    }, 200);
  }

  // Random interval between 2.5–5s
  function scheduleBlink() {
    var delay = 2500 + Math.random() * 2500;
    setTimeout(function () {
      blink();
      scheduleBlink();
    }, delay);
  }
  // Start after entrance animation
  setTimeout(scheduleBlink, 1500);

  /* ── Click → Jump ──────────────────────────────────────── */
  faceWrap.addEventListener('click', function () {
    if (faceWrap.classList.contains('jumping')) return;
    faceWrap.classList.add('jumping');
    faceWrap.addEventListener('animationend', function handler() {
      faceWrap.classList.remove('jumping');
      // Restore popUpSpring final state
      faceWrap.style.opacity = '1';
      faceWrap.style.transform = 'scale(1) translateY(0)';
      faceWrap.removeEventListener('animationend', handler);
    });
  });
})();
</script>
