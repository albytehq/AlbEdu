<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diblokir - AlbEdu</title>
    <meta name="theme-color" content="#ef4444">
    <link rel="icon" type="image/x-icon" href="../../public/images/favicon/favicon.ico">
    <link rel="stylesheet" href="../../styles/tokens.css">
    <link rel="stylesheet" href="../../styles/albedu-v1.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
</head>
<body style="background: linear-gradient(135deg, #fef2f2 0%, #fff 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;">
    <div style="max-width: 480px; width: 100%; text-align: center;">
        <div style="width: 96px; height: 96px; margin: 0 auto 24px; background: #ef4444; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 12px 32px rgba(239, 68, 68, 0.2);">
            <i class="material-symbols-outlined" style="font-size: 48px; color: #fff;">block</i>
        </div>
        <h1 style="font-size: 28px; font-weight: 700; color: #0f172a; margin: 0 0 8px;">Akses Diblokir</h1>
        <p style="font-size: 15px; color: #475569; margin: 0 0 24px; line-height: 1.6;">
            Sesi Anda telah diblokir oleh admin.
        </p>
        <div id="reason-box" style="background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 16px; margin-bottom: 32px; display: none;">
            <p style="font-size: 14px; color: #475569; margin: 0;">
                <strong>Alasan:</strong> <span id="reason-text"></span>
            </p>
        </div>
        <p style="font-size: 13px; color: #94a3b8; margin: 0 0 24px;">
            Hubungi admin jika Anda merasa ini adalah kesalahan.
        </p>
        <button class="albedu-btn albedu-btn-secondary" onclick="window.location.href='../login.html';" type="button">
            <i class="material-symbols-outlined">logout</i>
            Kembali ke Login
        </button>
    </div>
    <script>
      const reason = new URLSearchParams(window.location.search).get('reason');
      if (reason) {
        document.getElementById('reason-box').style.display = 'block';
        document.getElementById('reason-text').textContent = decodeURIComponent(reason);
      }
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('../../public/service-worker.js').catch(() => {}));
      }
    </script>
</body>
</html>
