<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk Asesmen - AlbEdu</title>
    <meta name="description" content="AlbEdu - Masukkan kode akses untuk mengerjakan asesmen">
    <meta name="theme-color" content="#2563eb">

    <link rel="icon" type="image/x-icon" href="../../public/images/favicon/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="../../public/images/favicon/favicon.svg">
    <link rel="icon" type="image/png" sizes="96x96" href="../../public/images/favicon/favicon-96x96.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../../public/images/favicon/apple-touch-icon.png">
    

    <link rel="stylesheet" href="../../styles/tokens.css">
    <link rel="stylesheet" href="../../styles/loading.css">
    <link rel="stylesheet" href="../../styles/albedu-v1.css">
    <link rel="stylesheet" href="../../public/QNotify/ui/notify.css">
    <link rel="stylesheet" href="../../public/QNotify/ui/dialog.css">
    <link rel="stylesheet" href="../../public/QNotify/ui/label.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">

    <!-- Cloudflare Turnstile -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" defer></script>
    <script src="../../src/utils/supabase-api.js" defer></script>

    <!-- Auth baseline -->
    <script src="../../src/auth/security.js" defer></script>
    <script src="../../src/utils/ui.js" defer></script>
    <script src="../../src/auth/errors.js" defer></script>
    <script src="../../src/auth/user-helpers.js" defer></script>
    <script src="../../src/auth/main.js" defer></script>
    <script src="../../src/auth/byteward.js" defer></script>

    <!-- QNotify -->
    <script type="module">
        import QNotify from '../../public/QNotify/api/index.js';
        window.QNotify = QNotify;
        window.show = QNotify;
        window.notify = {
            success: (t, m, d) => QNotify.notify.success(t, m, d),
            error: (t, m, d) => QNotify.notify.error(t, m, d),
            warning: (t, m, d) => QNotify.notify.warning(t, m, d),
            info: (t, m, d) => QNotify.notify.info(t, m, d),
            confirm: (opts) => QNotify.dialog.confirm(opts),
        };
        window.dispatchEvent(new Event('qnotify-ready'));
    </script>

    <link rel="stylesheet" href="../../styles/pages/assessment-entry.css">
</head>
<body>
    <div class="token-container">
        <div class="token-logo">
            <i class="material-symbols-outlined">quiz</i>
        </div>
        <h1 class="token-title">Masuk Asesmen</h1>
        <p class="token-subtitle">Masukkan 6-digit kode akses yang diberikan admin</p>

        <div class="cooldown-banner" id="cooldown-banner">
            <i class="material-symbols-outlined" style="font-size: 18px; vertical-align: middle;">schedule</i>
            <span id="cooldown-text">Terlalu banyak percobaan. Coba lagi dalam 60 detik.</span>
        </div>

        <div class="token-inputs" id="token-inputs">
            <input type="text" inputmode="numeric" maxlength="1" class="token-input" data-index="0" autocomplete="off" aria-label="Digit 1">
            <input type="text" inputmode="numeric" maxlength="1" class="token-input" data-index="1" autocomplete="off" aria-label="Digit 2">
            <input type="text" inputmode="numeric" maxlength="1" class="token-input" data-index="2" autocomplete="off" aria-label="Digit 3">
            <input type="text" inputmode="numeric" maxlength="1" class="token-input" data-index="3" autocomplete="off" aria-label="Digit 4">
            <input type="text" inputmode="numeric" maxlength="1" class="token-input" data-index="4" autocomplete="off" aria-label="Digit 5">
            <input type="text" inputmode="numeric" maxlength="1" class="token-input" data-index="5" autocomplete="off" aria-label="Digit 6">
        </div>

        <div class="turnstile-wrap" id="turnstile-wrap">
            <div id="turnstile-container"></div>
        </div>

        <button class="token-submit" id="token-submit" type="button" disabled>
            <span id="submit-text">Masuk Asesmen</span>
        </button>

        <div class="token-back">
            <a href="../../index.html">← Kembali ke beranda</a>
        </div>
    </div>

    <script>
      window.ALBYTE_WORKER_URL = 'https://edu.albyte-inc.workers.dev/upload';
    </script>

    <!-- Security modules -->
    <script src="../../src/security/consent.js" defer></script>
    <!-- v0.741.5 Theme System + i18n -->
    <script type="module" src="../../src/theme-system/index.js"></script>
    <script type="module" src="../../src/i18n/index.js"></script>
    <!-- Page controller -->
    <script src="../../src/pages/assessment-entry.js" defer></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('../../public/service-worker.js').catch(() => {}));
      }
    </script>
</body>
</html>
