<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk Asesmen - AlbEdu</title>
    <meta name="description" content="AlbEdu - Masukkan kode akses untuk mengerjakan asesmen">
    <meta name="theme-color" content="#2563eb">

    <link rel="icon" type="image/x-icon" href="../../public/images/favicon/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="../../public/images/favicon/favicon.svg">
    <link rel="icon" type="image/png" sizes="96x96" href="../../public/images/favicon/favicon-96x96.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../../public/images/favicon/apple-touch-icon.png">
    

        <!-- ═══ CRITICAL CSS (synchronous, tiny — paints shell in first paint) ═══ -->
    <script src="../../src/shared/head/critical-css.js"></script>

    <!-- ═══ Design tokens ═══ -->
    <link rel="stylesheet" href="../../styles/tokens.css">    <!-- QNotify Styles (consolidated) -->
    <link rel="stylesheet" href="../../public/QNotify/ui/qnotify.css"><!-- ═══ Deferred shared modules (run after parse, in order) ═══ -->
    <script defer src="../../src/shared/head/fonts.js"></script>
    <script defer src="../../src/shared/icons/icons.js"></script>
    <script defer src="../../src/platform/supabase-client.js"></script>
    <script type="module" src="../../src/shared/resilience.js"></script>
    <script defer src="../../src/platform/repository.js"></script>
    <script defer src="../../src/security/sanitize.js"></script>
    <script defer src="../../src/shared/boot.js"></script>
    <script defer src="RELPREFIXsrc/shared/error-boundary.js"></script>
    <script defer src="../../src/shared/qnotify-loader.js"></script>
    <link rel="stylesheet" href="../../styles/loading.css">
    <link rel="stylesheet" href="../../styles/albedu-v1.css">
    <link rel="stylesheet" href="../../styles/peserta-floating-profile.css"><!-- Cloudflare Turnstile -->
    <script async src="https://challenges.cloudflare.com/turnstile/v0/api.js"></script>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" async></script><!-- Auth baseline -->
    <script src="../../src/auth/security.js" defer></script>
    <script src="../../src/utils/ui.js" defer></script>
    <script src="../../src/auth/errors.js" defer></script>
    <script src="../../src/auth/user-helpers.js" defer></script>
    <script src="../../src/auth/main.js" defer></script>
    <script src="../../src/auth/byteward.js" defer></script><link rel="stylesheet" href="../../styles/pages/assessment-entry.css">
</head>
<body>
        <a href="#main-content" class="albedu-skip-link" data-i18n="common.skip_to_main">Langsung ke konten utama</a>
<div class="token-container">
        <div class="token-logo">
            <span data-albedu-icon="quiz"></span>
        </div>
        <h1 class="token-title" data-i18n="peserta.entry_title">Masuk Asesmen</h1>
        <p class="token-subtitle" data-i18n="peserta.entry_subtitle">Masukkan 6-digit kode akses yang diberikan admin</p>

        <div class="cooldown-banner" id="cooldown-banner">
            <span style="font-size: 18px; vertical-align: middle;" data-albedu-icon="schedule"></span>
            <span id="cooldown-text">Terlalu banyak percobaan. Coba lagi dalam 60 detik.</span>
        </div>

        <div class="token-inputs" id="token-inputs">
            <input type="text" inputmode="numeric" maxlength="1" class="token-input" data-index="0" autocomplete="off" aria-label="Digit 1">
            <input type="text" inputmode="numeric" maxlength="1" class="token-input" data-index="1" autocomplete="off" aria-label="Digit 2">
            <input type="text" inputmode="numeric" maxlength="1" class="token-input" data-index="2" autocomplete="off" aria-label="Digit 3">
            <input type="text" inputmode="numeric" maxlength="1" class="token-input" data-index="3" autocomplete="off" aria-label="Digit 4">
            <input type="text" inputmode="numeric" maxlength="1" class="token-input" data-index="4" autocomplete="off" aria-label="Digit 5">
            <input type="text" inputmode="numeric" maxlength="1" class="token-input" data-index="5" autocomplete="off" aria-label="Digit 6">
        </div>

        <div class="turnstile-wrap" id="turnstile-wrap">
            <div id="turnstile-container"></div>
        </div>

        <button class="token-submit" id="token-submit" type="button" disabled>
            <span id="submit-text" data-i18n="peserta.entry_submit">Masuk Asesmen</span>
        </button>

        <div class="token-back">
            <a href="../../index.html" data-i18n="peserta.entry_back">← Kembali ke beranda</a>
        </div>
    </div>

    <script>
      window.ALBYTE_WORKER_URL = 'https://edu.albyte-inc.workers.dev/upload';
    </script>

    <!-- Security modules -->
    <script src="../../src/security/consent.js" defer></script>
    <!-- v0.742.8 Theme System + i18n -->
    <script type="module" src="../../src/theme-system/index.js"></script>
    <script type="module" src="../../src/i18n/index.js"></script>
    <script defer src="../../src/i18n/lang-switcher.js"></script>
    <!-- v0.742.8: Floating profile button (triggers OptionProfile — gives peserta logout) -->
    <script src="../../src/profile/peserta-profile-fab.js" defer></script>
    <!-- Page controller -->
    <script src="../../src/pages/assessment-entry.js" defer></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('../../public/service-worker.js').catch(() => {}));
      }
    </script>
</body>
</html>
