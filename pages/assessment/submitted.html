<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudah Terkumpul - AlbEdu</title>
    <meta name="theme-color" content="#10b981">
    <link rel="icon" type="image/x-icon" href="../../public/images/favicon/favicon.ico">
    <link rel="stylesheet" href="../../styles/tokens.css">
    <link rel="stylesheet" href="../../styles/albedu-v1.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
</head>
<body style="background: linear-gradient(135deg, #ecfdf5 0%, #fff 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;">
    <div style="max-width: 480px; width: 100%; text-align: center;">
        <div style="width: 96px; height: 96px; margin: 0 auto 24px; background: #10b981; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 12px 32px rgba(16, 185, 129, 0.2);">
            <i class="material-symbols-outlined" style="font-size: 48px; color: #fff;">task_alt</i>
        </div>
        <h1 style="font-size: 28px; font-weight: 700; color: #0f172a; margin: 0 0 8px;">Sudah Terkumpul</h1>
        <p style="font-size: 15px; color: #475569; margin: 0 0 32px; line-height: 1.6;">
            Anda sudah mengumpulkan asesmen ini. Tidak dapat mengerjakan lagi.
        </p>
        <button class="albedu-btn albedu-btn-secondary" onclick="window.location.href='../login.html';" type="button">
            <i class="material-symbols-outlined">logout</i>
            Kembali ke Login
        </button>
    </div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('../../public/service-worker.js').catch(() => {}));
      }
    </script>
</body>
</html>
