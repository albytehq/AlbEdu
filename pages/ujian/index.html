<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title data-i18n="ujian.exam_title">Ujian - AlbEdu</title>
    <meta name="description" content="Sistem Ujian Online AlbEdu">
    <meta name="theme-color" content="#2563eb">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../../public/images/favicon/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="../../public/images/favicon/favicon.svg">
    <link rel="icon" type="image/png" sizes="96x96" href="../../public/images/favicon/favicon-96x96.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../../public/images/favicon/apple-touch-icon.png">
    <link rel="manifest" href="../../public/images/favicon/site.webmanifest">

    <!-- Design System Tokens -->
    <link rel="stylesheet" href="../../styles/tokens.css">
  <!-- F1+F2 fix: font loading strategy (preconnect + swap, no @import) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">

    <link rel="stylesheet" href="../../styles/loading.css">
    <link rel="stylesheet" href="../../styles/ujian.css">

    <!-- QNotify Styles -->
    <link rel="stylesheet" href="../../public/QNotify/ui/notify.css">
    <link rel="stylesheet" href="../../public/QNotify/ui/dialog.css">
    <link rel="stylesheet" href="../../public/QNotify/ui/label.css">
    <link rel="stylesheet" href="../../public/QNotify/ui/Readnote.css">

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" defer></script>
    <script src="../../src/utils/supabase-api.js" defer></script>

    <script src="../../src/auth/security.js" defer></script>
    <script src="../../src/utils/ui.js" defer></script>
    <script src="../../src/auth/errors.js" defer></script>
    <script src="../../src/auth/user-helpers.js" defer></script>
    <script src="../../src/auth/main.js" defer></script>
    <script src="../../src/auth/byteward.js" defer></script>

    <!-- ProfileEditorPanel — dipakai oleh OptionProfile -->
    <script src="../../src/profile/editor-panel.js" defer></script>
    <script src="../../src/i18n/translations/id.js" defer></script>
    <script src="../../src/i18n/translations/en.js" defer></script>
    <script src="../../src/i18n/index.js" defer></script>
</head>
<body>
    <div class="exam-container">
        <div class="exam-card card">
            <div class="exam-header">
                <div class="exam-logo">
                    <i class="material-symbols-outlined">school</i>
                </div>
                <h1 data-i18n="ujian.exam_title">AlbEdu Exam</h1>
                <div class="welcome-message">
                    <h2 data-i18n="ujian.welcome.title">Masukkan Token Ujian</h2>
                    <p class="sub-text" data-i18n="ujian.welcome.subtitle">Masukkan token, 5 digit yang diberikan oleh guru</p>
                </div>
            </div>

            <div class="token-input-section">
                <form id="tokenForm">
                    <div class="token-inputs">
                        <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="token-input" data-index="1"
                               autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" required>
                        <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="token-input" data-index="2"
                               autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" required>
                        <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="token-input" data-index="3"
                               autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" required>
                        <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="token-input" data-index="4"
                               autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" required>
                        <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="token-input" data-index="5"
                               autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" required>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary submit-button" id="submitBtn">
                            <i class="material-symbols-outlined">arrow_forward</i> <span data-i18n="ujian.submit">Masuk Ujian</span>
                        </button>
                        <button type="button" onclick="goBackBasedOnRole()" class="btn btn-secondary back-button">
                            <i class="material-symbols-outlined">arrow_back</i> <span data-i18n="ujian.back">Kembali</span>
                        </button>
                    </div>
                </form>
            </div>

            <!-- User chip: avatar + nama (klik untuk buka OptionProfile) -->
            <div id="userInfoChip" style="display:none;"></div>
        </div>
    </div>

    <!-- QNotify Module (ES Module) -->
    <script type="module">
        import QNotify from '../../public/QNotify/api/index.js';
        window.QNotify = QNotify;
        window.show    = QNotify;
        window.notify  = {
            success: (t, m, d) => QNotify.notify.success(t, m, d),
            error:   (t, m, d) => QNotify.notify.error(t, m, d),
            info:    (t, m, d) => QNotify.notify.info(t, m, d),
        };
    </script>

    <script src="../../src/pages/ujian.js" defer></script>

    <!-- OptionProfile -->
    <script src="../../src/profile/option-profile.js" defer></script>

    <script>
        function goBackBasedOnRole() {
            if (window.Auth?.userRole === 'admin') {
                window.location.href = '../admin/index.html';
            } else {
                window.location.reload();
            }
        }

        document.addEventListener('DOMContentLoaded', function () {

            function _avatar(userData, seed) {
                if (userData && userData.foto_profil) return userData.foto_profil;
                var words = seed.trim().split(/\s+/);
                var ini   = words.length >= 2
                    ? (words[0][0] + words[1][0]).toUpperCase()
                    : seed.slice(0, 2).toUpperCase();
                return 'https://ui-avatars.com/api/?name=' + encodeURIComponent(ini)
                     + '&background=2563eb&color=ffffff&size=64&bold=true&format=svg';
            }

            function _renderChip(user, userData) {
                var chip = document.getElementById('userInfoChip');
                if (!chip) return;

                var name  = (userData && userData.nama) ? userData.nama : (user && user.displayName ? user.displayName : '');
                var email = (user && user.email) ? user.email : '';
                var seed  = (name || email || 'U').split('@')[0].replace(/[._\-]/g, ' ');
                var incomplete = userData && userData.profilLengkap === false;

                chip.style.cssText = [
                    'display:flex',
                    'flex-direction:row',
                    'align-items:center',
                    'gap:12px',
                    'padding:14px 16px',
                    'margin-top:16px',
                    'border-radius:12px',
                    'background:var(--color-surface-2)',
                    'border:1px solid var(--color-border)',
                    'cursor:pointer',
                    'transition:background var(--transition-fast), border-color var(--transition-fast)',
                ].join(';');

                // Hover effect via JS — uses token colors
                chip.addEventListener('mouseover', function () {
                    chip.style.background = 'var(--color-primary-light)';
                    chip.style.borderColor = 'var(--color-primary)';
                });
                chip.addEventListener('mouseout', function () {
                    chip.style.background = 'var(--color-surface-2)';
                    chip.style.borderColor = 'var(--color-border)';
                });

                var avatarUrl = _avatar(userData, seed);

                // BUGFIX OptionProfile #2/#3: Validate avatar URL scheme (only
                // https: or data:image/) and remove inline onerror. The avatar
                // URL comes from user data which could be tampered with.
                var safeAvatarUrl = '';
                if (avatarUrl && (/^https:/i.test(avatarUrl) || /^data:image\//i.test(avatarUrl) || !/^[a-z]+:/i.test(avatarUrl))) {
                    safeAvatarUrl = avatarUrl.replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                }

                chip.innerHTML = ''
                    // Avatar
                    + '<div style="width:40px;height:40px;border-radius:10px;overflow:hidden;'
                    +   'border:2px solid var(--color-primary-light);background:var(--color-primary-light);flex-shrink:0;">'
                    +   (safeAvatarUrl
                        ? '<img src="' + safeAvatarUrl + '" alt="Avatar"'
                        +     ' style="width:100%;height:100%;object-fit:cover;" data-chip-avatar>'
                        : '<i style="color:var(--color-primary);font-size:16px;display:flex;align-items:center;justify-content:center;width:100%;height:100%;" class="material-symbols-outlined">person</i>')
                    + '</div>'
                    // Nama + email
                    + '<div style="flex:1;min-width:0;">'
                    +   '<div style="font-size:14px;color:var(--color-text);font-weight:600;line-height:1.3;'
                    +     'white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'
                    +     (name || email || '\u2014')
                    +   '</div>'
                    +   (email ? '<div style="font-size:12px;color:var(--color-text-muted);'
                    +     'white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'
                    +     email + '</div>' : '')
                    +   (incomplete ? '<span class="badge badge-warning" style="margin-top:4px;">'
                    +     'Profil belum lengkap</span>' : '')
                    + '</div>'
                    // Chevron indicator
                    + '<i style="font-size:12px;color:var(--color-text-faint);flex-shrink:0;" class="material-symbols-outlined">expand_less</i>';

                // BUGFIX OptionProfile #2: Attach onerror via event listener (not inline).
                var chipAvatar = chip.querySelector('img[data-chip-avatar]');
                if (chipAvatar) {
                    chipAvatar.addEventListener('error', function () {
                        this.style.display = 'none';
                    }, { once: true });
                }

                // Init OptionProfile on chip
                if (window.OptionProfile) {
                    window.OptionProfile.init({
                        triggers:   [chip],
                        context:    'standalone',
                        workerBase: 'https://albedu.examjuniorhighschool.workers.dev',
                    });
                }

                // Also init ProfileEditorPanel
                if (window.ProfileEditorPanel) {
                    window.ProfileEditorPanel.init({
                        trigger:    [],
                        workerBase: 'https://albedu.examjuniorhighschool.workers.dev',
                        onSaved: function (user) {
                            _renderChip(window.Auth && window.Auth.currentUser, user);
                        },
                    });
                }
            }

            function _pollAuth() {
                if (window.Auth && window.Auth.currentUser) {
                    _renderChip(window.Auth.currentUser, window.Auth.userData);
                    return;
                }
                var polls = 0;
                var t = setInterval(function () {
                    if ((window.Auth && window.Auth.currentUser) || ++polls > 15) {
                        clearInterval(t);
                        if (window.Auth && window.Auth.currentUser) {
                            _renderChip(window.Auth.currentUser, window.Auth.userData);
                        }
                    }
                }, 350);
            }

            // Listen for profile updates
            window.addEventListener('pep-saved', function (e) {
                if (window.Auth && e.detail) window.Auth.userData = e.detail;
                _renderChip(window.Auth && window.Auth.currentUser, window.Auth && window.Auth.userData);
            });

            window.addEventListener('op-profile-updated', function (e) {
                if (window.Auth && e.detail) window.Auth.userData = e.detail;
                _renderChip(window.Auth && window.Auth.currentUser, window.Auth && window.Auth.userData);
            });

            _pollAuth();
        });
    </script>

</body>
</html>
